{{/*
One ExternalSecret per unique ClusterSecretStore. Each pulls all entries
(envParams + envSecrets) routed to that store and materialises a Kubernetes
Secret named "{service}-{store}-env", which the Deployment mounts via
envFrom.secretRef.
*/}}
{{- range $store := .Values.secretStoreRefs }}
{{- $entries := list -}}
{{- range $.Values.envSecrets }}{{- if eq .store $store }}{{- $entries = append $entries . }}{{- end }}{{- end -}}
{{- range $.Values.envParams  }}{{- if eq .store $store }}{{- $entries = append $entries . }}{{- end }}{{- end -}}
{{- if $entries }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $.Values.service.name }}-{{ $store }}
  labels:
    {{- include "app.labels" $ | nindent 4 }}
spec:
  refreshInterval: {{ $.Values.externalSecretRefreshInterval }}
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ $.Values.service.name }}-{{ $store }}-env
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    {{- range $entries }}
    - secretKey: {{ .key }}
      remoteRef:
        key: {{ .path }}
        {{- if .field }}
        property: {{ .field }}
        {{- end }}
    {{- end }}
{{ end }}
{{- end }}
