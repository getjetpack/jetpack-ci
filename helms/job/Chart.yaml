apiVersion: v2
name: job
description: |
  Chart for Jetpack batch workloads. Renders either:
    • a Kubernetes CronJob (when .Values.schedule is set), or
    • a one-shot Job (when .Values.schedule is empty)
  …plus the same ConfigMap + ExternalSecret + ServiceAccount surface as
  the `app` chart, so the same .env.example schema works for either.

  Consumed by per-stack pipelines via `helm_type: job`.
type: application
version: 0.1.0
appVersion: "1.0"
