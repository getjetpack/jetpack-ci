name: "🐍 Python Service CI/CD (Reusable)"

# Cloud-agnostic 6-stage pipeline for Python services.
#
#   🎬 init   →  🔨 build  →  🧪 test  →  🏗️ infra  →  📦 release  →  🚀 deploy
#                  └────────────┘            (skipped if no TF changes)
#
# Same workflow handles AWS, GCP, and Azure — the cloud is an input and
# auth/registry/kubeconfig are gated by `case` switches. Each job exposes
# outputs so downstream jobs can pick them up via `needs.<job>.outputs.X`.
#
# Image path convention (constructed inside this workflow):
#
#   image_repo = {image_registry}/{organization}/{project_name}/{domain}/{service_name}
#   image_full = {image_repo}:{tag}
#
# That layout works for all clouds:
#   AWS  ECR:  123456789.dkr.ecr.us-west-2.amazonaws.com/testa/gcp/users/user-service
#   GCP  AR :  us-west2-docker.pkg.dev/testa/gcp/users/user-service
#   Azure ACR: acrname.azurecr.io/testa/gcp/users/user-service
#
# Pass `image_repo_override` (a fully-qualified repo URL, no tag) to bypass
# the convention entirely — useful for legacy registries or shared images.
#
# Caller example:
#
#   jobs:
#     deploy:
#       uses: getjetpack/jetpack-ci/.github/workflows/py-ci.yml@main
#       with:
#         cloud: gcp
#         organization: testa
#         project_name: gcp
#         domain: users           # service domain — comes from service config
#         service_name: user-service
#         env: dev
#         region: us-west2
#         image_registry: us-west2-docker.pkg.dev
#         cluster_name: gcp-dev
#         cluster_location: us-west2-a
#         gcp_workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
#         gcp_service_account: ${{ vars.GCP_DEPLOY_SA }}

on:
  workflow_call:
    inputs:
      # ── 🏷️ identity ──────────────────────────────────────────────────────
      organization:                   { description: "Jetpack org slug — first path segment of the image repo (e.g. testa)", required: true, type: string }
      project_name:                   { description: "Jetpack project slug (e.g. gcp)",                                    required: true, type: string }
      domain:                         { description: "Service domain — groups related services (e.g. users, orders)",     required: true, type: string }
      service_name:                   { description: "Service slug — last path segment of the image repo (e.g. user-svc)", required: true, type: string }
      env:                            { description: "dev | staging | prod",                                              required: true, type: string }
      region:                         { description: "Cloud region for both image registry and runtime",                  required: true, type: string }

      # ── ☁️ cloud ─────────────────────────────────────────────────────────
      cloud:                          { description: "aws | gcp | azure",                                                 required: true, type: string }
      aws_role_arn:                   { description: "AWS only — IAM role ARN assumed via OIDC",                          default: "", type: string }
      gcp_workload_identity_provider: { description: "GCP only — Workload Identity provider resource name",               default: "", type: string }
      gcp_service_account:            { description: "GCP only — deploy service account email",                           default: "", type: string }
      azure_client_id:                { description: "Azure only — federated client ID",                                  default: "", type: string }
      azure_tenant_id:                { description: "Azure only — tenant ID",                                            default: "", type: string }
      azure_subscription_id:          { description: "Azure only — subscription ID",                                      default: "", type: string }

      # ── 🐳 container ─────────────────────────────────────────────────────
      image_registry:                 { description: "Registry host (e.g. us-west2-docker.pkg.dev, 123.dkr.ecr.us-west-2.amazonaws.com, acr.azurecr.io)", required: true, type: string }
      image_repo_override:            { description: "Override the {registry}/{org}/{project}/{domain}/{service} convention with a fully-qualified repo URL (no tag).", default: "", type: string }

      # ── ⚓ cluster ──────────────────────────────────────────────────────
      cluster_name:                   { description: "Target Kubernetes cluster name",                                    required: true, type: string }
      cluster_location:               { description: "Region/zone for k8s (EKS/GKE) or resource group (AKS)",             required: true, type: string }
      chart_path:                     { description: "Helm chart directory inside the repo",                              default: "./helm", type: string }
      namespace:                      { description: "K8s namespace — defaults to `domain` so all services in the same domain share a namespace", default: "", type: string }
      helm_timeout:                   { description: "Helm rollout timeout (e.g. 5m, 10m)",                               default: "5m", type: string }

      # ── 🐍 python ────────────────────────────────────────────────────────
      python_version:                 { description: "Python version for setup-python",                                   default: "3.12", type: string }
      run_tests:                      { description: "Run pytest in the test job",                                        default: true,   type: boolean }

      # ── 🏗️ terraform (service infra) ────────────────────────────────────
      tf_dir:                         { description: "Per-service Terraform directory — apply only runs if files here changed", default: "./infra", type: string }

permissions:
  id-token: write
  contents: read

jobs:
  # ─── 🎬 INIT ────────────────────────────────────────────────────────────
  init:
    name: "🎬 Init"
    runs-on: ubuntu-latest
    outputs:
      image_repo:       ${{ steps.repo.outputs.repo }}
      image_tag:        ${{ steps.tag.outputs.tag }}
      image_full:       ${{ steps.tag.outputs.full }}
      namespace:        ${{ steps.ctx.outputs.namespace }}
      has_tf_changes:   ${{ steps.tf_changes.outputs.changed }}
      python_version:   ${{ inputs.python_version }}
      sha_short:        ${{ steps.tag.outputs.sha_short }}
    steps:
      - name: "🛎️ Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit for diff

      - name: "🧩 Compose image_repo"
        id: repo
        run: |
          # Convention: {registry}/{org}/{project}/{domain}/{service}
          # The override input wins when provided (legacy registries, shared repos).
          if [ -n "${{ inputs.image_repo_override }}" ]; then
            REPO="${{ inputs.image_repo_override }}"
            echo "::notice title=🧩 Repo override::using ${REPO}"
          else
            REPO="${{ inputs.image_registry }}/${{ inputs.organization }}/${{ inputs.project_name }}/${{ inputs.domain }}/${{ inputs.service_name }}"
            echo "::notice title=🧩 Image repo composed::${REPO}"
          fi
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"

      - name: "🏷️ Resolve image tag"
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          STAMP=$(date -u +%Y%m%d-%H%M)
          TAG="${SHORT_SHA}-${STAMP}"
          REPO="${{ steps.repo.outputs.repo }}"
          {
            echo "tag=${TAG}"
            echo "sha_short=${SHORT_SHA}"
            echo "full=${REPO}:${TAG}"
          } >> "$GITHUB_OUTPUT"
          echo "::notice title=🏷️ Image tag::${REPO}:${TAG}"

      - name: "📦 Context"
        id: ctx
        run: |
          # Namespace defaults to the service `domain` — services in the same
          # domain (e.g. users → user-svc + auth-svc + profile-svc) end up in
          # one namespace and can talk via short service names.
          NS="${{ inputs.namespace }}"
          if [ -z "$NS" ]; then NS="${{ inputs.domain }}"; fi
          echo "namespace=$NS" >> "$GITHUB_OUTPUT"
          echo "::notice title=📦 Namespace::$NS"

      - name: "🔎 Detect Terraform changes under ${{ inputs.tf_dir }}"
        id: tf_changes
        run: |
          # If the dir doesn't exist, infra job is skipped outright.
          if [ ! -d "${{ inputs.tf_dir }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=🔎 TF dir missing::no service infra to apply"
            exit 0
          fi
          # First commit (no HEAD~1) → treat as changed so initial apply runs.
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=🔎 First commit::running infra apply"
            exit 0
          fi
          if git diff --name-only HEAD~1 HEAD | grep -qE "^${{ inputs.tf_dir }}/"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=✅ TF changes detected::infra job will run"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=⏭️ No TF changes::infra job will be skipped"
          fi

      - name: "📋 Init summary"
        run: |
          {
            echo "### 🎬 Init"
            echo "| | |"
            echo "|---|---|"
            echo "| 🏷️ Image tag | \`${{ steps.tag.outputs.tag }}\` |"
            echo "| 📦 Namespace | \`${{ steps.ctx.outputs.namespace }}\` |"
            echo "| 🏗️ Terraform changes | \`${{ steps.tf_changes.outputs.changed }}\` |"
            echo "| ☁️ Cloud | \`${{ inputs.cloud }}\` |"
            echo "| 🌍 Region | \`${{ inputs.region }}\` |"
            echo "| 🎯 Env | \`${{ inputs.env }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── 🔨 BUILD ───────────────────────────────────────────────────────────
  build:
    name: "🔨 Build"
    needs: init
    runs-on: ubuntu-latest
    outputs:
      built:           "true"
      image_full:      ${{ needs.init.outputs.image_full }}
    steps:
      - name: "🛎️ Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python ${{ needs.init.outputs.python_version }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.init.outputs.python_version }}
          cache: "pip"

      - name: "📥 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then pip install -e . || true; fi

      - name: "🔍 Lint (optional)"
        continue-on-error: true
        run: |
          if command -v ruff >/dev/null 2>&1; then ruff check . || true; fi
          if command -v flake8 >/dev/null 2>&1; then flake8 . || true; fi

      - name: "🐳 Setup Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "🏗️ Build container image (no push)"
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ needs.init.outputs.image_full }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "📋 Build summary"
        run: |
          echo "### 🔨 Build" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ Image built: \`${{ needs.init.outputs.image_full }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ─── 🧪 TEST ────────────────────────────────────────────────────────────
  test:
    name: "🧪 Test"
    needs: init
    if: inputs.run_tests
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.run.outputs.result }}
    steps:
      - name: "🛎️ Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.init.outputs.python_version }}
          cache: "pip"

      - name: "📥 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then pip install -e ".[dev,test]" || pip install -e . || true; fi

      - name: "🧪 Run tests"
        id: run
        run: |
          if [ -d tests ] || [ -f pytest.ini ] || grep -q "pytest" pyproject.toml 2>/dev/null; then
            pytest -v --maxfail=1
            echo "result=passed" >> "$GITHUB_OUTPUT"
          else
            echo "::warning title=🧪 No tests::nothing to run — skipping"
            echo "result=skipped" >> "$GITHUB_OUTPUT"
          fi

      - name: "📋 Test summary"
        if: always()
        run: |
          echo "### 🧪 Test" >> "$GITHUB_STEP_SUMMARY"
          echo "Result: \`${{ steps.run.outputs.result }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ─── 🏗️ INFRA (skipped when no TF changes) ──────────────────────────────
  infra:
    name: "🏗️ Infra"
    needs: init
    if: needs.init.outputs.has_tf_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      applied:       "true"
      tf_outputs:    ${{ steps.tf.outputs.outputs_b64 }}
    steps:
      - name: "🛎️ Checkout"
        uses: actions/checkout@v4

      - name: "🔐 Authenticate to AWS (OIDC)"
        if: inputs.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region:     ${{ inputs.region }}

      - name: "🔐 Authenticate to GCP (WIF)"
        if: inputs.cloud == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ inputs.gcp_workload_identity_provider }}
          service_account:            ${{ inputs.gcp_service_account }}

      - name: "🔐 Authenticate to Azure (OIDC)"
        if: inputs.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id:       ${{ inputs.azure_client_id }}
          tenant-id:       ${{ inputs.azure_tenant_id }}
          subscription-id: ${{ inputs.azure_subscription_id }}

      - name: "🔧 Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: "🏗️ Terraform init + apply"
        id: tf
        working-directory: ${{ inputs.tf_dir }}
        env:
          TF_VAR_service_name: ${{ inputs.service_name }}
          TF_VAR_env:          ${{ inputs.env }}
          TF_VAR_region:       ${{ inputs.region }}
          TF_VAR_image_tag:    ${{ needs.init.outputs.image_tag }}
        run: |
          echo "::notice title=🏗️ Terraform::initialising"
          terraform init
          echo "::notice title=🏗️ Terraform::applying"
          terraform apply -auto-approve
          # Capture outputs as a base64 blob — downstream deploy job can pull
          # values from it via `jq` without us inventing per-output args.
          OUTPUTS_B64=$(terraform output -json | base64 -w0)
          echo "outputs_b64=$OUTPUTS_B64" >> "$GITHUB_OUTPUT"

      - name: "📋 Infra summary"
        run: |
          {
            echo "### 🏗️ Infra"
            echo "✅ Applied service infra at \`${{ inputs.tf_dir }}\`"
            echo ""
            echo "<details><summary>Outputs</summary>"
            echo ""
            echo '```json'
            cd ${{ inputs.tf_dir }} && terraform output -json
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── 📦 RELEASE (push image) ────────────────────────────────────────────
  release:
    name: "📦 Release"
    needs: [init, build, test]
    # Allow test to be skipped (when run_tests=false) but never failed.
    if: |
      always()
      && needs.build.result == 'success'
      && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      image_full:      ${{ needs.init.outputs.image_full }}
      image_digest:    ${{ steps.push.outputs.digest }}
    steps:
      - name: "🛎️ Checkout"
        uses: actions/checkout@v4

      - name: "🔐 Authenticate to AWS (OIDC)"
        if: inputs.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region:     ${{ inputs.region }}

      - name: "🔐 Authenticate to GCP (WIF)"
        if: inputs.cloud == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ inputs.gcp_workload_identity_provider }}
          service_account:            ${{ inputs.gcp_service_account }}

      - name: "☁️ Setup gcloud"
        if: inputs.cloud == 'gcp'
        uses: google-github-actions/setup-gcloud@v2

      - name: "🔐 Authenticate to Azure (OIDC)"
        if: inputs.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id:       ${{ inputs.azure_client_id }}
          tenant-id:       ${{ inputs.azure_tenant_id }}
          subscription-id: ${{ inputs.azure_subscription_id }}

      - name: "🔑 Registry login (cloud-aware)"
        env:
          IMAGE_REPO: ${{ needs.init.outputs.image_repo }}
        run: |
          case "${{ inputs.cloud }}" in
            aws)
              REGISTRY="${IMAGE_REPO%%/*}"
              echo "::notice title=🔑 ECR::logging in to $REGISTRY"
              aws ecr get-login-password --region "${{ inputs.region }}" \
                | docker login --username AWS --password-stdin "$REGISTRY"
              ;;
            gcp)
              REGISTRY="${IMAGE_REPO%%/*}"
              echo "::notice title=🔑 Artifact Registry::logging in to $REGISTRY"
              gcloud auth configure-docker "$REGISTRY" --quiet
              ;;
            azure)
              REGISTRY="${IMAGE_REPO%%/*}"
              echo "::notice title=🔑 ACR::logging in to ${REGISTRY%%.*}"
              az acr login --name "${REGISTRY%%.*}"
              ;;
            *)
              echo "::error::Unknown cloud '${{ inputs.cloud }}'"; exit 1 ;;
          esac

      - name: "🐳 Setup Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "📦 Build + push"
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ needs.init.outputs.image_full }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "📋 Release summary"
        run: |
          {
            echo "### 📦 Release"
            echo "✅ Pushed: \`${{ needs.init.outputs.image_full }}\`"
            echo "🔢 Digest: \`${{ steps.push.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── 🚀 DEPLOY ──────────────────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy"
    needs: [init, release, infra]
    # infra may be skipped when no TF changes — allow that.
    if: |
      always()
      && needs.release.result == 'success'
      && (needs.infra.result == 'success' || needs.infra.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      url:             ${{ steps.helm.outputs.url }}
      revision:        ${{ steps.helm.outputs.revision }}
      deployed_image:  ${{ needs.release.outputs.image_full }}
    steps:
      - name: "🛎️ Checkout"
        uses: actions/checkout@v4

      - name: "🔐 Authenticate to AWS (OIDC)"
        if: inputs.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region:     ${{ inputs.region }}

      - name: "🔐 Authenticate to GCP (WIF)"
        if: inputs.cloud == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ inputs.gcp_workload_identity_provider }}
          service_account:            ${{ inputs.gcp_service_account }}

      - name: "☁️ Setup gcloud"
        if: inputs.cloud == 'gcp'
        uses: google-github-actions/setup-gcloud@v2

      - name: "🔐 Authenticate to Azure (OIDC)"
        if: inputs.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id:       ${{ inputs.azure_client_id }}
          tenant-id:       ${{ inputs.azure_tenant_id }}
          subscription-id: ${{ inputs.azure_subscription_id }}

      - name: "🧭 Update kubeconfig (cloud-aware)"
        run: |
          case "${{ inputs.cloud }}" in
            aws)
              echo "::notice title=🧭 EKS::updating kubeconfig"
              aws eks update-kubeconfig \
                --name "${{ inputs.cluster_name }}" \
                --region "${{ inputs.region }}"
              ;;
            gcp)
              echo "::notice title=🧭 GKE::updating kubeconfig"
              gcloud container clusters get-credentials \
                "${{ inputs.cluster_name }}" \
                --location "${{ inputs.cluster_location }}"
              ;;
            azure)
              echo "::notice title=🧭 AKS::updating kubeconfig"
              az aks get-credentials \
                --name "${{ inputs.cluster_name }}" \
                --resource-group "${{ inputs.cluster_location }}" \
                --overwrite-existing
              ;;
          esac
          kubectl config current-context

      - name: "⚓ Setup Helm"
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: "🚀 helm upgrade --install"
        id: helm
        env:
          NS: ${{ needs.init.outputs.namespace }}
        run: |
          helm upgrade --install "${{ inputs.service_name }}" "${{ inputs.chart_path }}" \
            --namespace "$NS" \
            --create-namespace \
            --set image.repository="${{ needs.init.outputs.image_repo }}" \
            --set image.tag="${{ needs.init.outputs.image_tag }}" \
            --set environment="${{ inputs.env }}" \
            --set service.name="${{ inputs.service_name }}" \
            --wait \
            --atomic \
            --timeout "${{ inputs.helm_timeout }}"
          REVISION=$(helm history "${{ inputs.service_name }}" -n "$NS" -o json | jq -r '.[-1].revision')
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"
          # Best-effort service URL (cluster-internal — caller can override)
          URL="http://${{ inputs.service_name }}.$NS.svc.cluster.local"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: "🩺 Verify rollout"
        env:
          NS: ${{ needs.init.outputs.namespace }}
        run: |
          kubectl -n "$NS" rollout status "deploy/${{ inputs.service_name }}" --timeout="${{ inputs.helm_timeout }}"
          kubectl -n "$NS" get pods -l "app.kubernetes.io/name=${{ inputs.service_name }}"

      - name: "📋 Deploy summary"
        run: |
          {
            echo "### 🚀 Deploy"
            echo "| | |"
            echo "|---|---|"
            echo "| ☁️ Cloud | \`${{ inputs.cloud }}\` |"
            echo "| 🎡 Cluster | \`${{ inputs.cluster_name }}\` @ \`${{ inputs.cluster_location }}\` |"
            echo "| 📦 Image | \`${{ needs.init.outputs.image_full }}\` |"
            echo "| 📍 Namespace | \`${{ needs.init.outputs.namespace }}\` |"
            echo "| 🔢 Helm revision | \`${{ steps.helm.outputs.revision }}\` |"
            echo "| 🌐 In-cluster URL | \`${{ steps.helm.outputs.url }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
