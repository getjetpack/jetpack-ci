name: "Terraform CI (Reusable)"

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing Terraform files"
        required: true
        type: string
      terraform_version:
        description: "Terraform version"
        required: false
        type: string
        default: "latest"
      action:
        description: "Terraform action: plan, apply, or destroy"
        required: true
        type: string
      backend_bucket:
        description: "S3 bucket for Terraform state"
        required: true
        type: string
      backend_key:
        description: "S3 key for Terraform state file"
        required: true
        type: string
      backend_region:
        description: "S3 bucket region"
        required: true
        type: string
      var_file:
        description: "Path to .tfvars file (relative to working_directory)"
        required: false
        type: string
      aws_region:
        description: "AWS region for provider"
        required: true
        type: string
      environment:
        description: "GitHub environment for approvals"
        required: false
        type: string
      use_oidc:
        description: "Use GitHub OIDC to assume an AWS role (no static keys needed)"
        required: false
        type: boolean
        default: false
      aws_role_arn:
        description: "AWS IAM role ARN to assume via OIDC"
        required: false
        type: string
        default: ""
      post_init_script:
        description: "Shell commands to run after terraform init (e.g. auto-import existing resources)"
        required: false
        type: string
        default: ""
    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      JETPACK_APP_ID:
        required: false
      JETPACK_APP_PRIVATE_KEY:
        required: false

# ─────────────────────────────────────────────────────────────────────────────
# Jobs: Init → Validate + Scan (parallel) → Plan → Apply
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Init ────────────────────────────────────────────────────────────────
  init:
    name: "Init"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
      HAS_APP_ID: ${{ secrets.JETPACK_APP_ID }}
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🔐 Configure AWS (OIDC)"
        if: inputs.use_oidc
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: "🔐 Configure AWS (static keys)"
        if: "!inputs.use_oidc"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: "🪣 Ensure S3 state bucket exists"
        run: |
          if ! aws s3api head-bucket --bucket "${{ inputs.backend_bucket }}" 2>/dev/null; then
            echo "Creating S3 bucket: ${{ inputs.backend_bucket }}"
            aws s3api create-bucket \
              --bucket "${{ inputs.backend_bucket }}" \
              --region "${{ inputs.backend_region }}" \
              $(if [ "${{ inputs.backend_region }}" != "us-east-1" ]; then echo "--create-bucket-configuration LocationConstraint=${{ inputs.backend_region }}"; fi)
            aws s3api put-bucket-versioning \
              --bucket "${{ inputs.backend_bucket }}" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "${{ inputs.backend_bucket }}" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block \
              --bucket "${{ inputs.backend_bucket }}" \
              --public-access-block-configuration "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            BUCKET_STATUS="created"
          else
            BUCKET_STATUS="exists"
          fi
          echo "BUCKET_STATUS=$BUCKET_STATUS" >> "$GITHUB_ENV"

      - name: "🔑 Generate token for private TF modules"
        if: env.HAS_APP_ID != ''
        uses: actions/create-github-app-token@v1
        id: tf-modules-token
        with:
          app-id: ${{ secrets.JETPACK_APP_ID }}
          private-key: ${{ secrets.JETPACK_APP_PRIVATE_KEY }}
          owner: getjetpack
          repositories: jetpack-tf-modules

      - name: "🔑 Configure git for private TF modules"
        if: steps.tf-modules-token.outputs.token != ''
        run: git config --global url."https://x-access-token:${{ steps.tf-modules-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: "⚙️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: "📦 Terraform Init"
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init \
            -backend-config="bucket=${{ inputs.backend_bucket }}" \
            -backend-config="key=${{ inputs.backend_key }}" \
            -backend-config="region=${{ inputs.backend_region }}"

      - name: "🔄 Post-init script"
        if: inputs.post_init_script != ''
        working-directory: ${{ inputs.working_directory }}
        run: ${{ inputs.post_init_script }}

      - name: "📤 Cache initialized working directory"
        uses: actions/upload-artifact@v4
        with:
          name: tf-working-dir
          path: ${{ inputs.working_directory }}
          include-hidden-files: true
          retention-days: 1

      - name: "📝 Init Summary"
        if: always()
        run: |
          AUTH_MODE="${{ inputs.use_oidc && 'OIDC' || 'Static keys' }}"
          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## 📦 Terraform Init

          | Setting | Value |
          |---------|-------|
          | **Directory** | \`${{ inputs.working_directory }}\` |
          | **Backend** | \`s3://${{ inputs.backend_bucket }}/${{ inputs.backend_key }}\` |
          | **Region** | \`${{ inputs.aws_region }}\` |
          | **Auth** | ${AUTH_MODE} |
          | **Terraform** | \`${{ inputs.terraform_version }}\` |
          SUMMARY

          if [ "$BUCKET_STATUS" = "created" ]; then
            echo "| **State Bucket** | 🆕 Created with versioning + encryption |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| **State Bucket** | ✅ Already exists |" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── 2a. Validate (terraform validate + fmt) ─────────────────────────────────
  validate:
    name: "Validate"
    needs: init
    runs-on: ubuntu-latest
    steps:
      - name: "⚙️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: "📥 Restore working directory"
        uses: actions/download-artifact@v4
        with:
          name: tf-working-dir
          path: ${{ inputs.working_directory }}

      - name: "🔧 Restore provider permissions"
        run: find ${{ inputs.working_directory }}/.terraform -name 'terraform-provider-*' -exec chmod +x {} +

      - name: "✅ Terraform Validate"
        id: validate
        working-directory: ${{ inputs.working_directory }}
        run: |
          if terraform validate -no-color > /tmp/validate-output.txt 2>&1; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "errors=0" >> "$GITHUB_OUTPUT"
            echo "warnings=0" >> "$GITHUB_OUTPUT"
            cat /tmp/validate-output.txt
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "errors=1" >> "$GITHUB_OUTPUT"
            echo "warnings=0" >> "$GITHUB_OUTPUT"
            cat /tmp/validate-output.txt
            exit 1
          fi

      - name: "🎨 Terraform Format Check"
        id: fmt
        working-directory: ${{ inputs.working_directory }}
        run: |
          if terraform fmt -check -recursive -diff > /tmp/fmt-diff.txt 2>&1; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "status=drift" >> "$GITHUB_OUTPUT"
            echo "::warning::Terraform formatting drift detected — run 'terraform fmt -recursive'"
          fi

      - name: "📝 Validate Summary"
        if: always()
        working-directory: ${{ inputs.working_directory }}
        run: |
          VALIDATE_ICON=$( [ "${{ steps.validate.outputs.valid }}" = "true" ] && echo "✅" || echo "❌" )
          FMT_ICON=$( [ "${{ steps.fmt.outputs.status }}" = "pass" ] && echo "✅" || echo "⚠️" )

          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## ✅ Terraform Validate

          | Check | Status | Details |
          |-------|--------|---------|
          | **Validate** | ${VALIDATE_ICON} | ${{ steps.validate.outputs.errors }} errors, ${{ steps.validate.outputs.warnings }} warnings |
          | **Format** | ${FMT_ICON} | ${{ steps.fmt.outputs.status == 'pass' && 'All files formatted' || 'Drift detected — run `terraform fmt`' }} |
          SUMMARY

          if [ "${{ steps.fmt.outputs.status }}" != "pass" ] && [ -s /tmp/fmt-diff.txt ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Format diff</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```diff' >> "$GITHUB_STEP_SUMMARY"
            head -100 /tmp/fmt-diff.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── 2b. Scan (placeholder — will be implemented) ────────────────────────────
  scan:
    name: "Scan"
    needs: init
    runs-on: ubuntu-latest
    steps:
      - name: "🔒 Security Scan (coming soon)"
        run: echo "Security scanning will be implemented in a future release."

      - name: "📝 Scan Summary"
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY'
          ## 🔒 Security Scan

          ⏳ **Coming soon** — Trivy / tfsec integration will be added in a future release.
          SUMMARY

  # ── 3. Plan ────────────────────────────────────────────────────────────────
  plan:
    name: "Plan"
    needs: [validate, scan]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
      HAS_APP_ID: ${{ secrets.JETPACK_APP_ID }}
    steps:
      - name: "⚙️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: "📥 Restore working directory"
        uses: actions/download-artifact@v4
        with:
          name: tf-working-dir
          path: ${{ inputs.working_directory }}

      - name: "🔧 Restore provider permissions"
        run: find ${{ inputs.working_directory }}/.terraform -name 'terraform-provider-*' -exec chmod +x {} +

      - name: "🔐 Configure AWS (OIDC)"
        if: inputs.use_oidc
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: "🔐 Configure AWS (static keys)"
        if: "!inputs.use_oidc"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: "🔑 Generate token for private TF modules"
        if: env.HAS_APP_ID != ''
        uses: actions/create-github-app-token@v1
        id: tf-modules-token
        with:
          app-id: ${{ secrets.JETPACK_APP_ID }}
          private-key: ${{ secrets.JETPACK_APP_PRIVATE_KEY }}
          owner: getjetpack
          repositories: jetpack-tf-modules

      - name: "🔑 Configure git for private TF modules"
        if: steps.tf-modules-token.outputs.token != ''
        run: git config --global url."https://x-access-token:${{ steps.tf-modules-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: "📋 Terraform Plan"
        id: plan
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -o pipefail
          PLAN_ARGS=""
          if [ -n "${{ inputs.var_file }}" ]; then
            PLAN_ARGS="-var-file=${{ inputs.var_file }}"
          fi
          if [ "${{ inputs.action }}" = "destroy" ]; then
            PLAN_ARGS="$PLAN_ARGS -destroy"
          fi
          terraform plan $PLAN_ARGS -out=tfplan -detailed-exitcode -no-color 2>&1 | tee /tmp/plan-output.txt || PLAN_EXIT=$?

          # Exit codes: 0=no changes, 1=error, 2=changes present
          PLAN_EXIT=${PLAN_EXIT:-0}
          if [ "$PLAN_EXIT" -eq 1 ]; then
            echo "status=error" >> "$GITHUB_OUTPUT"
            exit 1
          elif [ "$PLAN_EXIT" -eq 2 ]; then
            echo "status=changes" >> "$GITHUB_OUTPUT"
          else
            echo "status=no-changes" >> "$GITHUB_OUTPUT"
          fi

          # Parse resource counts from plan output
          SUMMARY_LINE=$(grep -E "Plan:|No changes" /tmp/plan-output.txt | tail -1 || true)
          echo "summary=$SUMMARY_LINE" >> "$GITHUB_OUTPUT"

          ADD=$(echo "$SUMMARY_LINE" | grep -oP '\d+(?= to add)' || echo "0")
          CHANGE=$(echo "$SUMMARY_LINE" | grep -oP '\d+(?= to change)' || echo "0")
          DESTROY=$(echo "$SUMMARY_LINE" | grep -oP '\d+(?= to destroy)' || echo "0")
          echo "add=$ADD" >> "$GITHUB_OUTPUT"
          echo "change=$CHANGE" >> "$GITHUB_OUTPUT"
          echo "destroy=$DESTROY" >> "$GITHUB_OUTPUT"

      - name: "📤 Upload plan artifact"
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 1

      - name: "📝 Plan Summary"
        if: always()
        working-directory: ${{ inputs.working_directory }}
        run: |
          STATUS="${{ steps.plan.outputs.status }}"
          ADD="${{ steps.plan.outputs.add }}"
          CHANGE="${{ steps.plan.outputs.change }}"
          DESTROY="${{ steps.plan.outputs.destroy }}"

          if [ "$STATUS" = "no-changes" ]; then
            PLAN_ICON="✅"
            PLAN_HEADLINE="No changes — infrastructure is up to date"
          elif [ "$STATUS" = "error" ]; then
            PLAN_ICON="❌"
            PLAN_HEADLINE="Plan failed"
          else
            PLAN_ICON="📋"
            PLAN_HEADLINE="Changes detected"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## ${PLAN_ICON} Terraform Plan

          **${PLAN_HEADLINE}**

          | Action | Count |
          |--------|-------|
          | 🟢 Add | ${ADD} |
          | 🟡 Change | ${CHANGE} |
          | 🔴 Destroy | ${DESTROY} |
          SUMMARY

          # Resource-level change table
          if [ -f /tmp/plan-output.txt ] && [ "$STATUS" = "changes" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Resource changes</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Action | Resource |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|----------|" >> "$GITHUB_STEP_SUMMARY"

            grep -E '^\s+#\s+(.*)\s+(will be|must be)' /tmp/plan-output.txt | while IFS= read -r line; do
              RESOURCE=$(echo "$line" | sed -E 's/^\s+#\s+//' | sed -E 's/\s+(will be|must be).*//')
              if echo "$line" | grep -q "created"; then
                echo "| 🟢 create | \`$RESOURCE\` |" >> "$GITHUB_STEP_SUMMARY"
              elif echo "$line" | grep -q "updated"; then
                echo "| 🟡 update | \`$RESOURCE\` |" >> "$GITHUB_STEP_SUMMARY"
              elif echo "$line" | grep -q "destroyed"; then
                echo "| 🔴 destroy | \`$RESOURCE\` |" >> "$GITHUB_STEP_SUMMARY"
              elif echo "$line" | grep -q "replaced"; then
                echo "| 🟠 replace | \`$RESOURCE\` |" >> "$GITHUB_STEP_SUMMARY"
              fi
            done

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Full plan output</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -80 /tmp/plan-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── 4. Apply ───────────────────────────────────────────────────────────────
  apply:
    name: "${{ inputs.action == 'destroy' && 'Destroy' || 'Apply' }}"
    if: inputs.action == 'apply' || inputs.action == 'destroy'
    needs: plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: ${{ inputs.environment }}
    env:
      AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
      HAS_APP_ID: ${{ secrets.JETPACK_APP_ID }}
    steps:
      - name: "⚙️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: "📥 Restore working directory"
        uses: actions/download-artifact@v4
        with:
          name: tf-working-dir
          path: ${{ inputs.working_directory }}

      - name: "📥 Download plan"
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ inputs.working_directory }}

      - name: "🔧 Restore provider permissions"
        run: find ${{ inputs.working_directory }}/.terraform -name 'terraform-provider-*' -exec chmod +x {} +

      - name: "🔐 Configure AWS (OIDC)"
        if: inputs.use_oidc
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: "🔐 Configure AWS (static keys)"
        if: "!inputs.use_oidc"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: "🔑 Generate token for private TF modules"
        if: env.HAS_APP_ID != ''
        uses: actions/create-github-app-token@v1
        id: tf-modules-token
        with:
          app-id: ${{ secrets.JETPACK_APP_ID }}
          private-key: ${{ secrets.JETPACK_APP_PRIVATE_KEY }}
          owner: getjetpack
          repositories: jetpack-tf-modules

      - name: "🔑 Configure git for private TF modules"
        if: steps.tf-modules-token.outputs.token != ''
        run: git config --global url."https://x-access-token:${{ steps.tf-modules-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: "🚀 Terraform ${{ inputs.action == 'destroy' && 'Destroy' || 'Apply' }}"
        id: apply
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -o pipefail
          terraform apply -auto-approve -no-color tfplan 2>&1 | tee /tmp/apply-output.txt

      - name: "📝 ${{ inputs.action == 'destroy' && 'Destroy' || 'Apply' }} Summary"
        if: always()
        run: |
          ACTION_LABEL="${{ inputs.action == 'destroy' && 'Destroy' || 'Apply' }}"
          if [ "${{ steps.apply.outcome }}" = "success" ]; then
            APPLY_ICON="${{ inputs.action == 'destroy' && '💥' || '🚀' }}"
            APPLY_STATUS="${ACTION_LABEL} succeeded"
          else
            APPLY_ICON="❌"
            APPLY_STATUS="${ACTION_LABEL} failed"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## ${APPLY_ICON} Terraform ${ACTION_LABEL}

          **${APPLY_STATUS}**

          | Setting | Value |
          |---------|-------|
          | **Directory** | \`${{ inputs.working_directory }}\` |
          | **Environment** | \`${{ inputs.environment || 'default' }}\` |
          | **Region** | \`${{ inputs.aws_region }}\` |
          SUMMARY

          if [ -f /tmp/apply-output.txt ]; then
            # Extract "Apply complete! Resources: X added, Y changed, Z destroyed."
            RESULT_LINE=$(grep -E "Apply complete!|Destroy complete!" /tmp/apply-output.txt || true)
            if [ -n "$RESULT_LINE" ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "> $RESULT_LINE" >> "$GITHUB_STEP_SUMMARY"
            fi

            # Show outputs if present
            OUTPUTS=$(sed -n '/^Outputs:/,$ p' /tmp/apply-output.txt || true)
            if [ -n "$OUTPUTS" ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "<details><summary>Outputs</summary>" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "$OUTPUTS" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
