name: "Terraform CI (Reusable)"

# OIDC-only workflow for bootstrap and per-environment infrastructure.
# Assumes an IAM role in the target account via GitHub OIDC — no static keys.

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing Terraform files"
        required: true
        type: string
      terraform_version:
        description: "Terraform version"
        required: false
        type: string
        default: "latest"
      action:
        description: "Terraform action: plan, apply, or destroy"
        required: true
        type: string
      backend_bucket:
        description: "S3 bucket for Terraform state"
        required: true
        type: string
      backend_key:
        description: "S3 key for Terraform state file"
        required: true
        type: string
      backend_region:
        description: "S3 bucket region"
        required: true
        type: string
      var_file:
        description: "Path to .tfvars file (relative to working_directory)"
        required: false
        type: string
      aws_region:
        description: "AWS region for provider"
        required: true
        type: string
      aws_role_arn:
        description: "AWS IAM role ARN to assume via OIDC"
        required: true
        type: string
      environment:
        description: "GitHub environment for approvals"
        required: false
        type: string
    secrets:
      JETPACK_APP_ID:
        required: false
      JETPACK_APP_PRIVATE_KEY:
        required: false

jobs:
  # ── 1. Init ────────────────────────────────────────────────────────────────
  init:
    name: "Init"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      HAS_APP_ID: ${{ secrets.JETPACK_APP_ID }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Configure AWS (OIDC)"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: "Ensure S3 state bucket exists"
        run: |
          if ! aws s3api head-bucket --bucket "${{ inputs.backend_bucket }}" 2>/dev/null; then
            echo "Creating S3 bucket: ${{ inputs.backend_bucket }}"
            aws s3api create-bucket \
              --bucket "${{ inputs.backend_bucket }}" \
              --region "${{ inputs.backend_region }}" \
              $(if [ "${{ inputs.backend_region }}" != "us-east-1" ]; then echo "--create-bucket-configuration LocationConstraint=${{ inputs.backend_region }}"; fi)
            aws s3api put-bucket-versioning \
              --bucket "${{ inputs.backend_bucket }}" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "${{ inputs.backend_bucket }}" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block \
              --bucket "${{ inputs.backend_bucket }}" \
              --public-access-block-configuration "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
          fi

      - name: "Generate token for private TF modules"
        if: env.HAS_APP_ID != ''
        uses: actions/create-github-app-token@v1
        id: tf-modules-token
        with:
          app-id: ${{ secrets.JETPACK_APP_ID }}
          private-key: ${{ secrets.JETPACK_APP_PRIVATE_KEY }}
          owner: getjetpack
          repositories: jetpack-tf-modules

      - name: "Configure git for private TF modules"
        if: steps.tf-modules-token.outputs.token != ''
        run: git config --global url."https://x-access-token:${{ steps.tf-modules-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: "Terraform Init"
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init \
            -backend-config="bucket=${{ inputs.backend_bucket }}" \
            -backend-config="key=${{ inputs.backend_key }}" \
            -backend-config="region=${{ inputs.backend_region }}"

      - name: "Cache initialized working directory"
        uses: actions/upload-artifact@v4
        with:
          name: tf-working-dir
          path: ${{ inputs.working_directory }}
          include-hidden-files: true
          retention-days: 1

  # ── 2. Validate ──────────────────────────────────────────────────────────
  validate:
    name: "Validate"
    needs: init
    runs-on: ubuntu-latest
    steps:
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: "Restore working directory"
        uses: actions/download-artifact@v4
        with:
          name: tf-working-dir
          path: ${{ inputs.working_directory }}

      - name: "Restore provider permissions"
        run: find ${{ inputs.working_directory }}/.terraform -name 'terraform-provider-*' -exec chmod +x {} +

      - name: "Terraform Validate"
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate -no-color

  # ── 3. Plan ──────────────────────────────────────────────────────────────
  plan:
    name: "Plan"
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      HAS_APP_ID: ${{ secrets.JETPACK_APP_ID }}
    steps:
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: "Restore working directory"
        uses: actions/download-artifact@v4
        with:
          name: tf-working-dir
          path: ${{ inputs.working_directory }}

      - name: "Restore provider permissions"
        run: find ${{ inputs.working_directory }}/.terraform -name 'terraform-provider-*' -exec chmod +x {} +

      - name: "Configure AWS (OIDC)"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: "Generate token for private TF modules"
        if: env.HAS_APP_ID != ''
        uses: actions/create-github-app-token@v1
        id: tf-modules-token
        with:
          app-id: ${{ secrets.JETPACK_APP_ID }}
          private-key: ${{ secrets.JETPACK_APP_PRIVATE_KEY }}
          owner: getjetpack
          repositories: jetpack-tf-modules

      - name: "Configure git for private TF modules"
        if: steps.tf-modules-token.outputs.token != ''
        run: git config --global url."https://x-access-token:${{ steps.tf-modules-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: "Terraform Plan"
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -o pipefail
          PLAN_ARGS=""
          if [ -n "${{ inputs.var_file }}" ]; then
            PLAN_ARGS="-var-file=${{ inputs.var_file }}"
          fi
          if [ "${{ inputs.action }}" = "destroy" ]; then
            PLAN_ARGS="$PLAN_ARGS -destroy"
          fi
          terraform plan $PLAN_ARGS -out=tfplan -no-color

      - name: "Upload plan artifact"
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 1

  # ── 4. Apply ─────────────────────────────────────────────────────────────
  apply:
    name: "${{ inputs.action == 'destroy' && 'Destroy' || 'Apply' }}"
    if: inputs.action == 'apply' || inputs.action == 'destroy'
    needs: plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: ${{ inputs.environment }}
    env:
      HAS_APP_ID: ${{ secrets.JETPACK_APP_ID }}
    steps:
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: "Restore working directory"
        uses: actions/download-artifact@v4
        with:
          name: tf-working-dir
          path: ${{ inputs.working_directory }}

      - name: "Download plan"
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ inputs.working_directory }}

      - name: "Restore provider permissions"
        run: find ${{ inputs.working_directory }}/.terraform -name 'terraform-provider-*' -exec chmod +x {} +

      - name: "Configure AWS (OIDC)"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: "Generate token for private TF modules"
        if: env.HAS_APP_ID != ''
        uses: actions/create-github-app-token@v1
        id: tf-modules-token
        with:
          app-id: ${{ secrets.JETPACK_APP_ID }}
          private-key: ${{ secrets.JETPACK_APP_PRIVATE_KEY }}
          owner: getjetpack
          repositories: jetpack-tf-modules

      - name: "Configure git for private TF modules"
        if: steps.tf-modules-token.outputs.token != ''
        run: git config --global url."https://x-access-token:${{ steps.tf-modules-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: "Terraform ${{ inputs.action == 'destroy' && 'Destroy' || 'Apply' }}"
        id: apply
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -o pipefail
          terraform apply -auto-approve -no-color tfplan

      - name: "Capture terraform outputs"
        if: steps.apply.outcome == 'success' && inputs.action == 'apply'
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform output -json > /tmp/tf-outputs.json

          # If VPN profile exists in S3, download and embed in outputs
          VPN_BUCKET=$(terraform output -raw vpn_profile_s3_bucket 2>/dev/null || echo "")
          VPN_KEY=$(terraform output -raw vpn_profile_s3_key 2>/dev/null || echo "")
          if [ -n "$VPN_BUCKET" ] && [ -n "$VPN_KEY" ]; then
            echo "Downloading VPN profile from s3://$VPN_BUCKET/$VPN_KEY"
            for i in 1 2 3 4 5; do
              if aws s3 cp "s3://$VPN_BUCKET/$VPN_KEY" /tmp/vpn-profile.ovpn 2>/dev/null; then
                OVPN_CONTENT=$(cat /tmp/vpn-profile.ovpn | jq -Rs .)
                # Inject into outputs JSON
                jq --arg content "$OVPN_CONTENT" '. + {"vpn_profile_ovpn": {"value": ($content | fromjson), "type": "string", "sensitive": false}}' /tmp/tf-outputs.json > /tmp/tf-outputs-tmp.json
                mv /tmp/tf-outputs-tmp.json /tmp/tf-outputs.json
                echo "VPN profile embedded in outputs"
                break
              fi
              echo "VPN profile not ready yet (attempt $i/5), waiting 30s..."
              sleep 30
            done
          fi

      - name: "Upload terraform outputs"
        if: steps.apply.outcome == 'success' && inputs.action == 'apply'
        uses: actions/upload-artifact@v4
        with:
          name: tf-outputs
          path: /tmp/tf-outputs.json
          retention-days: 90
