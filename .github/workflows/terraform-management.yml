name: "Terraform Management (Reusable)"

# For foundation & identity layers that run in the management account
# with static AWS credentials. After apply, sends terraform outputs
# to Jetpack API using GitHub OIDC for authentication.

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing Terraform files"
        required: true
        type: string
      terraform_version:
        description: "Terraform version"
        required: false
        type: string
        default: "latest"
      action:
        description: "Terraform action: plan, apply, or destroy"
        required: true
        type: string
      backend_bucket:
        description: "S3 bucket for Terraform state"
        required: true
        type: string
      backend_key:
        description: "S3 key for Terraform state file"
        required: true
        type: string
      backend_region:
        description: "S3 bucket region"
        required: true
        type: string
      var_file:
        description: "Path to .tfvars file (relative to working_directory)"
        required: false
        type: string
      aws_region:
        description: "AWS region for provider"
        required: true
        type: string
      environment:
        description: "GitHub environment for approvals"
        required: false
        type: string
      callback_url:
        description: "Jetpack API URL to POST terraform outputs after apply"
        required: false
        type: string
        default: ""
      post_init_script:
        description: "Shell commands to run after terraform init"
        required: false
        type: string
        default: ""
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      JETPACK_APP_ID:
        required: false
      JETPACK_APP_PRIVATE_KEY:
        required: false

# ─────────────────────────────────────────────────────────────────────────────
# Jobs: Init → Validate + Scan (parallel) → Plan → Apply → Callback
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Init ────────────────────────────────────────────────────────────────
  init:
    name: "Init"
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
      HAS_APP_ID: ${{ secrets.JETPACK_APP_ID }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Ensure S3 state bucket exists"
        run: |
          if ! aws s3api head-bucket --bucket "${{ inputs.backend_bucket }}" 2>/dev/null; then
            echo "Creating S3 bucket: ${{ inputs.backend_bucket }}"
            aws s3api create-bucket \
              --bucket "${{ inputs.backend_bucket }}" \
              --region "${{ inputs.backend_region }}" \
              $(if [ "${{ inputs.backend_region }}" != "us-east-1" ]; then echo "--create-bucket-configuration LocationConstraint=${{ inputs.backend_region }}"; fi)
            aws s3api put-bucket-versioning \
              --bucket "${{ inputs.backend_bucket }}" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "${{ inputs.backend_bucket }}" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block \
              --bucket "${{ inputs.backend_bucket }}" \
              --public-access-block-configuration "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
          fi

      - name: "Generate token for private TF modules"
        if: env.HAS_APP_ID != ''
        uses: actions/create-github-app-token@v1
        id: tf-modules-token
        with:
          app-id: ${{ secrets.JETPACK_APP_ID }}
          private-key: ${{ secrets.JETPACK_APP_PRIVATE_KEY }}
          owner: getjetpack
          repositories: jetpack-tf-modules

      - name: "Configure git for private TF modules"
        if: steps.tf-modules-token.outputs.token != ''
        run: git config --global url."https://x-access-token:${{ steps.tf-modules-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: "Terraform Init"
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init \
            -backend-config="bucket=${{ inputs.backend_bucket }}" \
            -backend-config="key=${{ inputs.backend_key }}" \
            -backend-config="region=${{ inputs.backend_region }}"

      - name: "Post-init script"
        if: inputs.post_init_script != ''
        working-directory: ${{ inputs.working_directory }}
        run: ${{ inputs.post_init_script }}

      - name: "Cache initialized working directory"
        uses: actions/upload-artifact@v4
        with:
          name: tf-working-dir
          path: ${{ inputs.working_directory }}
          include-hidden-files: true
          retention-days: 1

  # ── 2. Validate ──────────────────────────────────────────────────────────
  validate:
    name: "Validate"
    needs: init
    runs-on: ubuntu-latest
    steps:
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: "Restore working directory"
        uses: actions/download-artifact@v4
        with:
          name: tf-working-dir
          path: ${{ inputs.working_directory }}

      - name: "Restore provider permissions"
        run: find ${{ inputs.working_directory }}/.terraform -name 'terraform-provider-*' -exec chmod +x {} +

      - name: "Terraform Validate"
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate -no-color

      - name: "Terraform Format Check"
        working-directory: ${{ inputs.working_directory }}
        run: |
          if ! terraform fmt -check -recursive -diff 2>&1; then
            echo "::warning::Terraform formatting drift detected"
          fi

  # ── 3. Plan ──────────────────────────────────────────────────────────────
  plan:
    name: "Plan"
    needs: validate
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
      HAS_APP_ID: ${{ secrets.JETPACK_APP_ID }}
    steps:
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: "Restore working directory"
        uses: actions/download-artifact@v4
        with:
          name: tf-working-dir
          path: ${{ inputs.working_directory }}

      - name: "Restore provider permissions"
        run: find ${{ inputs.working_directory }}/.terraform -name 'terraform-provider-*' -exec chmod +x {} +

      - name: "Generate token for private TF modules"
        if: env.HAS_APP_ID != ''
        uses: actions/create-github-app-token@v1
        id: tf-modules-token
        with:
          app-id: ${{ secrets.JETPACK_APP_ID }}
          private-key: ${{ secrets.JETPACK_APP_PRIVATE_KEY }}
          owner: getjetpack
          repositories: jetpack-tf-modules

      - name: "Configure git for private TF modules"
        if: steps.tf-modules-token.outputs.token != ''
        run: git config --global url."https://x-access-token:${{ steps.tf-modules-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: "Terraform Plan"
        id: plan
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -o pipefail
          PLAN_ARGS=""
          if [ -n "${{ inputs.var_file }}" ]; then
            PLAN_ARGS="-var-file=${{ inputs.var_file }}"
          fi
          if [ "${{ inputs.action }}" = "destroy" ]; then
            PLAN_ARGS="$PLAN_ARGS -destroy"
          fi
          terraform plan $PLAN_ARGS -out=tfplan -no-color 2>&1 | tee /tmp/plan-output.txt

      - name: "Upload plan artifact"
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 1

  # ── 4. Apply ─────────────────────────────────────────────────────────────
  apply:
    name: "${{ inputs.action == 'destroy' && 'Destroy' || 'Apply' }}"
    if: inputs.action == 'apply' || inputs.action == 'destroy'
    needs: plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: ${{ inputs.environment }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
      HAS_APP_ID: ${{ secrets.JETPACK_APP_ID }}
    steps:
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: "Restore working directory"
        uses: actions/download-artifact@v4
        with:
          name: tf-working-dir
          path: ${{ inputs.working_directory }}

      - name: "Download plan"
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ inputs.working_directory }}

      - name: "Restore provider permissions"
        run: find ${{ inputs.working_directory }}/.terraform -name 'terraform-provider-*' -exec chmod +x {} +

      - name: "Generate token for private TF modules"
        if: env.HAS_APP_ID != ''
        uses: actions/create-github-app-token@v1
        id: tf-modules-token
        with:
          app-id: ${{ secrets.JETPACK_APP_ID }}
          private-key: ${{ secrets.JETPACK_APP_PRIVATE_KEY }}
          owner: getjetpack
          repositories: jetpack-tf-modules

      - name: "Configure git for private TF modules"
        if: steps.tf-modules-token.outputs.token != ''
        run: git config --global url."https://x-access-token:${{ steps.tf-modules-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: "Terraform ${{ inputs.action == 'destroy' && 'Destroy' || 'Apply' }}"
        id: apply
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -o pipefail
          terraform apply -auto-approve -no-color tfplan 2>&1 | tee /tmp/apply-output.txt

      - name: "Capture terraform outputs"
        if: steps.apply.outcome == 'success' && inputs.action == 'apply'
        id: outputs
        working-directory: ${{ inputs.working_directory }}
        run: terraform output -json > /tmp/tf-outputs.json

      - name: "Upload terraform outputs"
        if: steps.outputs.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tf-outputs
          path: /tmp/tf-outputs.json
          retention-days: 90
