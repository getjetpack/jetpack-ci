name: "🔐 Compose helm values"
description: |
  Reusable composite action: produces a single helm-values YAML file the
  pipeline can pass via `helm upgrade --values`. The file combines two
  kinds of input:

    1. Service identity (service.name, image.repository, image.tag,
       environment, replicaCount, …) so the helm step needs zero --set
       flags.
    2. Schema-driven env injection parsed from .env.example — emits
       envLiterals / envParams / envSecrets / secretStoreRefs in the
       shape the shared app/job charts consume.

  Cloud-agnostic and stack-agnostic — used by py-ci.yml today, reused by
  nodejs-ci.yml / java-ci.yml / go-ci.yml as they land.

  Schema syntax (in the service repo's .env.example):
    KEY=literal-default                       → ConfigMap data
    KEY=${param:logical-name}                 → ConfigMap data (param store)
    KEY=${secret:logical-name}                → ExternalSecret (cloud Secret Manager)
    KEY=${secret:logical-name#json-field}     → ExternalSecret with JSON field extract
    KEY=${vault:secret/data/path#field}       → ExternalSecret (HashiCorp Vault, path passthrough)
    KEY=${<any-source>:logical-name}          → ExternalSecret routed by source

  Path composition:
    For non-vault sources, the logical name expands to
       {org}/{project}/{env}/{domain}/{service}/{name}
    Vault paths pass through verbatim.

  Output:
    A YAML file ready to pass to `helm upgrade --values <file>`:
      envLiterals:    { KEY: "value", … }
      envParams:      [ { key, source, path, store }, … ]
      envSecrets:     [ { key, source, path, store, [field] }, … ]
      secretStoreRefs: [ store1, store2, … ]   # distinct stores used

inputs:
  organization:
    description: "Org slug — first segment of the composed path"
    required: true
  project_name:
    description: "Project slug — second segment"
    required: true
  domain:
    description: "Service domain — fourth segment (groups related services)"
    required: true
  service_name:
    description: "Service slug — fifth segment"
    required: true
  env:
    description: "Environment — third segment (dev / staging / prod)"
    required: true
  schema_file:
    description: "Path to the .env.example file — pass '' to skip schema parsing and emit only identity"
    default: ".env.example"
  output_file:
    description: "Path to write the generated helm values YAML"
    default: "/tmp/values-env.yaml"

  # ── Identity injected into the values file (no --set flags needed) ───
  image_repository:
    description: "Container image repo (no tag). Becomes image.repository in the values."
    default: ""
  image_tag:
    description: "Container image tag. Becomes image.tag."
    default: ""
  service_port:
    description: "Container port (becomes service.port)"
    default: "8080"
  replicas:
    description: "Initial replica count (becomes replicaCount)"
    default: "1"
  cloud:
    description: "aws | gcp | azure — only needed when .env.example contains K8S_OVERRIDE_* entries backed by a source ref that must be resolved at CI time."
    default: ""
  secret_store:
    description: "ClusterSecretStore name for ${secret:…} entries"
    default: "cloud-default"
  param_store:
    description: "ClusterSecretStore name for ${param:…} / ${ssm:…} entries"
    default: "param-default"
  vault_store:
    description: "ClusterSecretStore name for ${vault:…} entries"
    default: "vault-default"
  internal_domain:
    description: "Private DNS domain. When set, the helm chart emits an internal LoadBalancer + external-dns annotation so the service is reachable via VPN at {service}.{namespace}.{internal_domain}."
    default: ""
  extra_store_map:
    description: |
      JSON object mapping additional source prefixes to ClusterSecretStore
      names, for example:  {"doppler":"doppler-default","onepassword":"1p-default"}
      The action falls back to `secret_store` for any prefix not listed here
      (or in the well-known set above).
    default: "{}"

  # ── Ambient env-scoped literals ────────────────────────────────────────
  # Non-sensitive globals injected into every service's ConfigMap without
  # the service having to declare them in its own .env.example. Provided by
  # the deploy workflow YAML (generated per env by Jetpack). ENVIRONMENT is
  # auto-derived from `env`; the rest are opt-in via these inputs.
  log_level:
    description: "LOG_LEVEL injected as an ambient env literal for every service in this env."
    default: ""
  otlp_endpoint:
    description: "OTLP_ENDPOINT injected as an ambient env literal for every service in this env."
    default: ""
  extra_ambient:
    description: |
      JSON object of additional ambient env literals to inject (e.g. {"REGION":"us-west2"}).
      Keys already declared in .env.example win — ambient values are only
      injected when the service hasn't overridden the key.
    default: "{}"

outputs:
  values_file:
    description: "Path to the generated values YAML (only meaningful when skipped=false)"
    value: ${{ steps.parse.outputs.values_file }}
  skipped:
    description: "true if the schema file was absent — caller should not pass --values"
    value: ${{ steps.parse.outputs.skipped }}
  literal_count:
    description: "Number of literal entries"
    value: ${{ steps.parse.outputs.literal_count }}
  param_count:
    description: "Number of param entries"
    value: ${{ steps.parse.outputs.param_count }}
  secret_count:
    description: "Number of secret entries (across all stores)"
    value: ${{ steps.parse.outputs.secret_count }}
  override_count:
    description: "Number of K8S_OVERRIDE_* entries injected into the values file"
    value: ${{ steps.parse.outputs.override_count }}
  namespace_override:
    description: "Resolved value of K8S_OVERRIDE_NAMESPACE (when set) — the pipeline should pass this to helm --namespace"
    value: ${{ steps.parse.outputs.namespace_override }}
  stores:
    description: "Comma-separated list of distinct ClusterSecretStore names referenced"
    value: ${{ steps.parse.outputs.stores }}

runs:
  using: "composite"
  steps:
    - name: "📦 Install pyyaml"
      shell: bash
      run: |
        python3 -m pip install --user --quiet pyyaml 2>/dev/null \
          || python3 -m pip install --user --quiet --break-system-packages pyyaml

    - name: "📝 Compose values file"
      id: parse
      shell: bash
      env:
        ORG:           ${{ inputs.organization }}
        PROJECT:       ${{ inputs.project_name }}
        DOMAIN:        ${{ inputs.domain }}
        SERVICE:       ${{ inputs.service_name }}
        ENVIRON:       ${{ inputs.env }}
        SCHEMA:        ${{ inputs.schema_file }}
        OUTPUT:        ${{ inputs.output_file }}
        STORE_SEC:     ${{ inputs.secret_store }}
        STORE_PRM:     ${{ inputs.param_store }}
        STORE_VLT:     ${{ inputs.vault_store }}
        EXTRA_STORES:  ${{ inputs.extra_store_map }}
        IMAGE_REPO:    ${{ inputs.image_repository }}
        IMAGE_TAG:     ${{ inputs.image_tag }}
        SERVICE_PORT:    ${{ inputs.service_port }}
        INTERNAL_DOMAIN: ${{ inputs.internal_domain }}
        AMBIENT_LOG_LEVEL:     ${{ inputs.log_level }}
        AMBIENT_OTLP_ENDPOINT: ${{ inputs.otlp_endpoint }}
        AMBIENT_EXTRA:         ${{ inputs.extra_ambient }}
        # NAMESPACE is unset here — the Python step reads it from the env and
        # falls back to DOMAIN when absent (see the `namespace` assignment
        # further down). The chart uses namespace to compose the external-dns
        # hostname: {service}.{namespace}.{internal_domain}.
        REPLICAS:      ${{ inputs.replicas }}
        CLOUD:         ${{ inputs.cloud }}
      run: |
        python3 - <<'PY'
        import os, re, json, pathlib, yaml

        prefix = f"{os.environ['ORG']}/{os.environ['PROJECT']}/{os.environ['ENVIRON']}/{os.environ['DOMAIN']}/{os.environ['SERVICE']}"

        # ── Schema parsing (optional — skipped if file absent or path empty)
        schema_path = os.environ.get("SCHEMA", "").strip()
        literals, params, secrets = {}, [], []
        schema_seen = False
        if schema_path and pathlib.Path(schema_path).is_file():
            schema_seen = True
            schema_text = pathlib.Path(schema_path).read_text()

            stores = {
                "secret": os.environ["STORE_SEC"],
                "param":  os.environ["STORE_PRM"],
                "ssm":    os.environ["STORE_PRM"],
                "vault":  os.environ["STORE_VLT"],
            }
            try:
                extras = json.loads(os.environ.get("EXTRA_STORES") or "{}")
                stores.update(extras)
            except json.JSONDecodeError as e:
                print(f"::warning title=Bad extra_store_map::{e}")

            param_sources = {"param", "ssm"}
            ref_re = re.compile(r"^\$\{(?P<src>[a-z0-9_-]+):(?P<path>[^}#]+)(?:#(?P<field>[^}]+))?\}$")

            # Provider-specific naming rules for the secret backend. Slashes
            # are fine on AWS (they're the natural hierarchy in SSM Parameter
            # Store and Secrets Manager) but rejected on GCP Secret Manager
            # (names must match [a-zA-Z_-][a-zA-Z0-9_-]*) and Azure Key Vault
            # (names must match [a-zA-Z0-9-]). Vault always passes through.
            _cloud = (os.environ.get("CLOUD") or "").lower()
            def compose_path(src, raw):
                if src == "vault":
                    return raw
                full = f"{prefix}/{raw}"
                if _cloud in ("gcp", "azure"):
                    return full.replace("/", "-")
                return full

            # ── K8S_OVERRIDE_* support ─────────────────────────────────
            # KEY in .env.example that starts with K8S_OVERRIDE_ doesn't go
            # into the running pod's env. Instead its value is resolved at
            # CI time and injected into the helm values file at the mapped
            # path. That lets a service author tune chart values via the
            # same schema mechanism, including pulling secrets from SSM /
            # Secret Manager / Vault.
            #
            # Convention:  K8S_OVERRIDE_REPLICAS=3                     → replicaCount = 3
            #              K8S_OVERRIDE_REPLICAS=${ssm:foo/bar}        → fetch from cloud at CI, then set
            #              K8S_OVERRIDE_NAMESPACE=team-x               → namespace (used by pipeline)
            #
            # Mapping table — extend as the chart grows.
            override_map = {
                "REPLICAS":                  "replicaCount",
                "NAMESPACE":                 "_namespace",   # consumed by pipeline, not chart
                "IMAGE_TAG":                 "image.tag",
                "IMAGE_REPOSITORY":          "image.repository",
                "IMAGE_PULL_POLICY":         "image.pullPolicy",
                "SERVICE_PORT":              "service.port",
                "SCHEDULE":                  "schedule",
                "TIMEZONE":                  "timeZone",
                "AUTOSCALING_ENABLED":       "autoscaling.enabled",
                "AUTOSCALING_MIN":           "autoscaling.minReplicas",
                "AUTOSCALING_MAX":           "autoscaling.maxReplicas",
                "AUTOSCALING_CPU":           "autoscaling.targetCPUUtilizationPercentage",
                "RESOURCES_REQUESTS_CPU":    "resources.requests.cpu",
                "RESOURCES_REQUESTS_MEMORY": "resources.requests.memory",
                "RESOURCES_LIMITS_CPU":      "resources.limits.cpu",
                "RESOURCES_LIMITS_MEMORY":   "resources.limits.memory",
                "PRIORITY_CLASS":            "priorityClassName",
                "REFRESH_INTERVAL":          "externalSecretRefreshInterval",
            }

            def resolve_ref_at_ci_time(src, raw, field):
                """Fetch a secret/param value via the cloud's CLI at CI time."""
                import subprocess
                cloud = (os.environ.get("CLOUD") or "").lower()
                full_path = raw if src == "vault" else f"{prefix}/{raw}"
                try:
                    if src in ("secret",):
                        if cloud == "gcp":
                            out = subprocess.check_output(["gcloud", "secrets", "versions", "access", "latest", "--secret", full_path.replace("/", "-")], text=True)
                        elif cloud == "aws":
                            out = subprocess.check_output(["aws", "secretsmanager", "get-secret-value", "--secret-id", full_path, "--query", "SecretString", "--output", "text"], text=True)
                        elif cloud == "azure":
                            out = subprocess.check_output(["az", "keyvault", "secret", "show", "--name", full_path.replace("/", "-").split("-")[-1], "--query", "value", "--output", "tsv"], text=True)
                        else:
                            raise RuntimeError(f"K8S_OVERRIDE_* with source={src} requires `cloud` input set")
                    elif src in ("param", "ssm"):
                        if cloud == "aws":
                            out = subprocess.check_output(["aws", "ssm", "get-parameter", "--name", f"/{full_path}", "--with-decryption", "--query", "Parameter.Value", "--output", "text"], text=True)
                        elif cloud == "gcp":
                            # GCP doesn't have Parameter Store — falls back to Secret Manager
                            out = subprocess.check_output(["gcloud", "secrets", "versions", "access", "latest", "--secret", full_path.replace("/", "-")], text=True)
                        else:
                            raise RuntimeError(f"Cloud {cloud!r} has no Parameter Store equivalent for K8S_OVERRIDE_*")
                    elif src == "vault":
                        out = subprocess.check_output(["vault", "kv", "get", "-field", field or "value", raw], text=True)
                    else:
                        raise RuntimeError(f"Unknown source {src!r} for K8S_OVERRIDE_*")
                    out = out.strip()
                    if field and src != "vault":
                        # JSON secret — extract the field
                        try:
                            out = str(json.loads(out)[field])
                        except (json.JSONDecodeError, KeyError):
                            pass
                    return out
                except subprocess.CalledProcessError as e:
                    raise RuntimeError(f"Failed to resolve K8S_OVERRIDE source {src}:{raw} — {e}")

            def set_nested(d, dot_path, value):
                parts = dot_path.split(".")
                for p in parts[:-1]:
                    d = d.setdefault(p, {})
                # Coerce numeric strings to int/float so YAML emits typed values
                try:
                    if value in ("true", "false"): value = value == "true"
                    elif "." in value:             value = float(value)
                    else:                          value = int(value)
                except (ValueError, AttributeError, TypeError):
                    pass
                d[parts[-1]] = value

            overrides = {}            # dotted-path → resolved value
            override_namespace = None  # consumed by pipeline; not chart

            for line in schema_text.splitlines():
                s = line.strip()
                if not s or s.startswith("#") or "=" not in s:
                    continue
                key, val = s.split("=", 1)
                key, val = key.strip(), val.strip()

                # ── K8S_OVERRIDE_* — resolved at CI time, injected into values ──
                if key.startswith("K8S_OVERRIDE_"):
                    suffix = key[len("K8S_OVERRIDE_"):]
                    helm_path = override_map.get(suffix)
                    if not helm_path:
                        print(f"::warning title=Unknown K8S_OVERRIDE::{key} — not in override map; ignored")
                        continue
                    m = ref_re.match(val)
                    if m:
                        resolved = resolve_ref_at_ci_time(m.group("src"), m.group("path"), m.group("field"))
                    else:
                        resolved = val
                    if helm_path == "_namespace":
                        override_namespace = resolved
                    else:
                        set_nested(overrides, helm_path, resolved)
                    continue

                m = ref_re.match(val)
                if not m:
                    literals[key] = val
                    continue
                src   = m.group("src")
                raw   = m.group("path")
                field = m.group("field")
                # Vault passes through; AWS keeps slashes; GCP + Azure strip them
                # (secret-manager backends there reject slashes in names).
                path  = compose_path(src, raw)
                store = stores.get(src, os.environ["STORE_SEC"])
                entry = {"key": key, "source": src, "path": path, "store": store}
                if field:
                    entry["field"] = field
                (params if src in param_sources else secrets).append(entry)
        else:
            if schema_path:
                print(f"::notice title=🔐 No schema::{schema_path} absent — emitting identity-only values")
            overrides = {}
            override_namespace = None

        # ── Ambient env-scoped literals (injected only when the service
        #    hasn't declared the same key in its own .env.example). Sources:
        #      • ENVIRONMENT — always, from the ENVIRON env var
        #      • LOG_LEVEL, OTLP_ENDPOINT — from action inputs
        #      • extra_ambient JSON — pipeline-provided extras (REGION, etc.)
        ambient = {"ENVIRONMENT": os.environ["ENVIRON"]}
        if os.environ.get("AMBIENT_LOG_LEVEL"):
            ambient["LOG_LEVEL"] = os.environ["AMBIENT_LOG_LEVEL"]
        if os.environ.get("AMBIENT_OTLP_ENDPOINT"):
            ambient["OTLP_ENDPOINT"] = os.environ["AMBIENT_OTLP_ENDPOINT"]
        try:
            ambient_extra = json.loads(os.environ.get("AMBIENT_EXTRA") or "{}")
            if isinstance(ambient_extra, dict):
                for k, v in ambient_extra.items():
                    ambient[str(k)] = str(v)
        except json.JSONDecodeError as e:
            print(f"::warning title=Bad extra_ambient::{e}")
        for k, v in ambient.items():
            literals.setdefault(k, v)

        store_set = sorted({e["store"] for e in (*params, *secrets)})

        # ── Identity (always emitted; chart needs at minimum service.name + image)
        service_obj = {
            "name": os.environ["SERVICE"],
            "port": int(os.environ.get("SERVICE_PORT") or 8080),
        }
        # When set, the chart switches to internal LoadBalancer + emits an
        # external-dns annotation so the service is reachable via VPN at
        # {service}.{namespace}.{internal_domain}. Defaults to empty →
        # ClusterIP fallback (in-cluster traffic only).
        if os.environ.get("INTERNAL_DOMAIN"):
            service_obj["internalDomain"] = os.environ["INTERNAL_DOMAIN"]
            service_obj["namespace"]       = os.environ.get("NAMESPACE", os.environ.get("DOMAIN", "default"))

        out = {
            "service":     service_obj,
            "environment": os.environ["ENVIRON"],
            "replicaCount": int(os.environ.get("REPLICAS") or 1),
        }
        if os.environ.get("IMAGE_REPO") or os.environ.get("IMAGE_TAG"):
            out["image"] = {
                "repository": os.environ.get("IMAGE_REPO", ""),
                "tag":        os.environ.get("IMAGE_TAG", "latest"),
            }

        # ── K8S_OVERRIDE_* — deep-merge resolved values on top of identity
        def deep_merge(dst, src):
            for k, v in src.items():
                if isinstance(v, dict) and isinstance(dst.get(k), dict):
                    deep_merge(dst[k], v)
                else:
                    dst[k] = v
        if overrides:
            deep_merge(out, overrides)

        # ── envLiterals is emitted whenever we have any literals — either
        # from a parsed .env.example OR from ambient injection above. Schema-
        # only blocks (envParams / envSecrets / secretStoreRefs) still gate
        # on schema_seen since they only make sense with a real schema.
        if literals:
            out["envLiterals"] = literals
        if schema_seen:
            out["envParams"]       = params
            out["envSecrets"]      = secrets
            out["secretStoreRefs"] = store_set

        out_path = pathlib.Path(os.environ["OUTPUT"])
        out_path.parent.mkdir(parents=True, exist_ok=True)
        out_path.write_text(yaml.safe_dump(out, sort_keys=False))

        print("───── composed values.yaml ─────")
        print(out_path.read_text())
        print("─────────────────────────────────")

        with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
            fh.write(f"skipped={'false' if schema_seen else 'no-schema'}\n")
            fh.write(f"values_file={out_path}\n")
            fh.write(f"literal_count={len(literals)}\n")
            fh.write(f"param_count={len(params)}\n")
            fh.write(f"secret_count={len(secrets)}\n")
            fh.write(f"override_count={len(overrides)}\n")
            fh.write(f"namespace_override={override_namespace or ''}\n")
            fh.write(f"stores={','.join(store_set)}\n")
        PY

    - name: "📊 Schema summary"
      shell: bash
      if: steps.parse.outputs.skipped != 'no-schema'
      run: |
        {
          echo "### 🔐 Env schema"
          echo "| | |"
          echo "|---|---|"
          echo "| 📄 Literals | ${{ steps.parse.outputs.literal_count }} |"
          echo "| 🎛️ Params | ${{ steps.parse.outputs.param_count }} |"
          echo "| 🔑 Secrets | ${{ steps.parse.outputs.secret_count }} |"
          echo "| 🗂️ Stores | \`${{ steps.parse.outputs.stores }}\` |"
        } >> "$GITHUB_STEP_SUMMARY"
